name: bible_quotes
version: 1.0.0+1
publish_to: none

description: Aplikacja z cytatami biblijnymi dopasowanymi do nastroju

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # UI Components
  share_plus: ^7.2.1
  path_provider: ^2.1.1

  # Utilities
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
