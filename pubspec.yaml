name: bible_quotes
version: 1.0.0+1
publish_to: none

description: Aplikacja z cytatami biblijnymi dopasowanymi do nastroju

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0

  # State management
  provider: ^6.1.1
  flutter_bloc: ^8.1.3

  # Animations
  lottie: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_card_swiper: ^7.0.0

  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  screenshot: ^2.1.0

  # Utilities
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  logger: ^2.0.2
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
    - assets/images/
    - assets/animations/

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-Light.ttf
          weight: 300
